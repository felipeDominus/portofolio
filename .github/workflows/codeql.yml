# CodeQL security analysis. Uploads to Security tab (requires Code scanning enabled).
# On GitHub Free, Code scanning is only available for PUBLIC repos.
# If this repo is private (or you haven't enabled Code scanning), the upload fails.
# This job is disabled below so CI doesn't fail. Remove the "if" to run CodeQL once
# you've enabled Code scanning (or made the repo public on Free plan).
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    if: false  # Set to true after enabling Code scanning in repo Settings
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
